name: Training

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  train:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear generated results
        run: |
          rm -f results/*.keras results/*.json results/manifest.json

      - name: Train models
        run: |
          python main.py --run-pipeline --models all

      - name: Upload trained results
        uses: actions/upload-artifact@v4
        with:
          name: trained-results
          path: results/

      - name: Commit updated model files
        run: |
          if git status --porcelain results | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results
            git commit -m "chore: update trained models"
            git push
          else
            echo "No result file changes to commit."
          fi
