name: Create Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release date
        id: release_date
        run: echo "value=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Package trained models
        run: |
          if [ -d results ]; then
            tar -czf results.tar.gz results
          else
            echo "results directory not found" && exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_date.outputs.value }}
          generate_release_notes: true
          files: results.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}